# ═══════════════════════════════════════════════════════
#  Warehouse CRM — CI/CD Pipeline (GitHub Actions)
# ═══════════════════════════════════════════════════════
#  Triggers: push to main branch
#  Steps:    build images → push to GHCR → SSH deploy to VPS
#
#  Required GitHub Secrets:
#    VPS_HOST       — VPS IP or hostname
#    VPS_USER       — SSH username (e.g. deploy)
#    VPS_SSH_KEY    — Private SSH key (ed25519 recommended)
#    GHCR_TOKEN     — GitHub PAT with write:packages (or use GITHUB_TOKEN)
# ═══════════════════════════════════════════════════════

name: Deploy WMS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/wms-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/wms-frontend

jobs:
  # ── Build & Push Backend Image ──
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build & Push Frontend Image ──
  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://${{ vars.DOMAIN || 'wms.example.com' }}/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to VPS ──
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            cd /opt/wms

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env pull backend frontend

            # Rolling restart (backend first, then frontend)
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --no-deps backend
            echo "Waiting for backend health..."
            sleep 10
            docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d --no-deps frontend
            echo "Waiting for frontend health..."
            sleep 5

            # Verify health
            curl -sf http://localhost:3003/health || { echo "Backend health check failed!"; exit 1; }
            curl -sf http://localhost:3002/ > /dev/null || { echo "Frontend health check failed!"; exit 1; }

            # Prune old images
            docker image prune -f

            echo "✅ Deployment complete!"
