# ─────────────────────────────────────────────────
#  Warehouse CRM — Nginx Virtual Host (Production)
# ─────────────────────────────────────────────────
#  File: /etc/nginx/sites-available/wms.conf
#  Symlink: ln -s /etc/nginx/sites-available/wms.conf /etc/nginx/sites-enabled/

# Rate limiter for login endpoint (10 req/min per IP, burst 5)
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

# Upstream definitions (Docker containers on host network)
upstream backend {
    server 127.0.0.1:3003;
}

upstream frontend {
    server 127.0.0.1:3002;
}

upstream grafana {
    server 127.0.0.1:3001;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name wms.example.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wms.example.com;

    # ── TLS (managed by certbot) ──
    ssl_certificate     /etc/letsencrypt/live/wms.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wms.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ── Security Headers ──
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Timeouts ──
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;
    send_timeout          30s;
    client_max_body_size  10M;

    # ── Common proxy headers ──
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── WebSocket support (for HMR in dev, keep for SSE/WS) ──
    proxy_http_version 1.1;
    proxy_set_header   Upgrade $http_upgrade;
    proxy_set_header   Connection "upgrade";

    # ─────────────────────────────
    #  Backend API
    # ─────────────────────────────
    location /api/ {
        proxy_pass http://backend;
    }

    # Health endpoint (public)
    location = /health {
        proxy_pass http://backend;
    }

    # Rate-limited login endpoint
    location = /api/v1/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
    }

    location = /api/v1/auth/register {
        limit_req zone=login_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://backend;
    }

    # ─────────────────────────────
    #  Metrics (localhost / admin IP only)
    # ─────────────────────────────
    location = /metrics {
        # Allow only from localhost and admin IP
        allow 127.0.0.1;
        allow ::1;
        # allow YOUR_ADMIN_IP;  # ← uncomment and set
        deny all;
        proxy_pass http://backend;
    }

    # ─────────────────────────────
    #  Grafana (sub-path)
    # ─────────────────────────────
    location /grafana/ {
        proxy_pass http://grafana/;
    }

    location /grafana/api/live/ {
        proxy_pass http://grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─────────────────────────────
    #  Frontend (catch-all — must be last)
    # ─────────────────────────────
    location / {
        proxy_pass http://frontend;
    }
}
