# ═══════════════════════════════════════════════════════════════
#  Warehouse CRM — Production Docker Compose
# ═══════════════════════════════════════════════════════════════
#  Usage:
#    cp deploy/.env.example deploy/.env
#    # Edit deploy/.env with real secrets
#    docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env up -d
# ═══════════════════════════════════════════════════════════════

services:
  # ── Backend (Go / Fiber) ──
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/yourorg/wms-backend:latest}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: wms-backend
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      APP_PORT: "3000"
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin"
      DB_NAME: "${MONGO_DB}"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_EXPIRY_HOURS: "${JWT_EXPIRY_HOURS:-24}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://wms.example.com}"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "{{.Name}}"
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - wms-net

  # ── Frontend (Next.js Standalone) ──
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/yourorg/wms-frontend:latest}
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "${NEXT_PUBLIC_API_BASE_URL:-https://wms.example.com/api/v1}"
    container_name: wms-frontend
    ports:
      - "127.0.0.1:3002:3000"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "{{.Name}}"
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - wms-net

  # ── MongoDB 7 (with authentication) ──
  mongodb:
    image: mongo:7
    container_name: wms-mongodb
    # No external port binding — only accessible within wms-net
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD}"
      MONGO_INITDB_DATABASE: "${MONGO_DB}"
    volumes:
      - mongo_data:/data/db
      - mongo_config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet --norc -u ${MONGO_USER} -p ${MONGO_PASSWORD} --authenticationDatabase admin localhost:27017/test || exit 1" ]
      interval: 15s
      timeout: 60s
      retries: 10
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G
    networks:
      - wms-net

  # ═══════════════════════════════════════════════
  #  Observability Stack (optional — comment out if not needed)
  # ═══════════════════════════════════════════════

  # ── Prometheus ──
  prometheus:
    image: prom/prometheus:latest
    container_name: wms-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=2GB"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - wms-net

  # ── Grafana ──
  grafana:
    image: grafana/grafana:latest
    container_name: wms-grafana
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SERVER_ROOT_URL: "https://${DOMAIN:-wms.example.com}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ADMIN_USER: "${GF_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - wms-net

  # ── Loki (log aggregation) ──
  loki:
    image: grafana/loki:2.9.0
    container_name: wms-loki
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - wms-net

  # ── Promtail (ships Docker logs → Loki) ──
  promtail:
    image: grafana/promtail:2.9.0
    container_name: wms-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - wms-net

# ── Named Volumes ──
volumes:
  mongo_data:
  mongo_config:
  prometheus_data:
  grafana_data:
  loki_data:

    # ── Network ──
networks:
  wms-net:
    driver: bridge
